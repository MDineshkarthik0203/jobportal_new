{% extends 'base.html' %} {% block content %}

<h2>Applications for {{ job.title }}</h2>

{% for app in applications %}
<div class="job-card">
  <p><strong>Name:</strong> {{ app.full_name }}</p>

  <a href="{{ app.resume.url }}" target="_blank"> 📄 View Resume </a>
</div>
{% endfor %} {% endblock %}
