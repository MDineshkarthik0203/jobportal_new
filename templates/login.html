{% extends 'base.html' %} {% block content %}

<h2>Login</h2>
<br />
<br />

<form method="post">
  {% csrf_token %}

  <p><strong>USERNAME</strong></p>
  <input name="username" placeholder="Username" required /><br />
  <p><strong>PASSWORD</strong></p>
  <input
    name="password"
    type="password"
    placeholder="Password"
    required
  /><br />

  <button type="submit">Login</button>
</form>
{% endblock %}
